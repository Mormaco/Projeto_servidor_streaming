<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stoner Rock PE - Acervo</title>
    <!-- CHAMANDO O CSS EXTERNO -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="exploitation-header">
    <img src="img/banner.jpg" alt="Stoner Rock PE Header">
    <div class="overlay-text">
        <h1>STONER ROCK PE</h1>
        <p style="color: #fff; font-weight: bold; text-shadow: 2px 2px #000; margin-top: 10px;">RARIDADES DO DESERTO & DISTORÇÕES</p>
    </div>
</div>

<div class="acervo-box">
    <h2 style="margin: 0 0 15px 0; letter-spacing: 2px; text-transform: uppercase;">Acesse o Acervo Musical</h2>
    <div style="margin-bottom: 25px; font-size: 1.1em; line-height: 1.6; color: #eee;">
        <p>Ouça a nossa biblioteca pelo Navidrome:</p>
        <p>USUÁRIO: <strong style="color: #f1c40f;">Ouvinte</strong></p>
        <p>SENHA: <strong style="color: #f1c40f;">Stoner</strong></p>
    </div>
    <a href="/player/" target="_blank" rel="noopener noreferrer" class="btn-player">ENTRAR NO REPOSITÓRIO</a>
</div>

<div class="apoio-container" style="text-align: center; padding: 20px; background: #111; border-radius: 12px; border: 1px solid #222;">
    <h2 style="color: #fff; margin-bottom: 10px;">APOIE ESTE PROJETO</h2>
    <p style="font-size: 14px; color: #bbb; line-height: 1.6;">Roda 24h <strong>Recife/PE</strong>.<br>Ajude a manter os álbuns online!</p>
    
    <div style="display: flex; flex-direction: column; gap: 15px; align-items: center; margin-top: 25px;">
        
        <!-- BOTÃO KO-FI -->
        <a href="https://ko-fi.com/linuxds6" target="_blank" style="display: flex;">
            <img height="36" style="border:0px; height:36px;" src="https://storage.ko-fi.com/cdn/kofi3.png?v=3" border="0" alt="Apoie no Ko-fi" />
        </a>

        <!-- BOTÃO PIX -->
        <button onclick="copiarPix()" style="background-color: #32bcad; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 200px; transition: 0.3s;" onmouseover="this.style.backgroundColor='#28a093'" onmouseout="this.style.backgroundColor='#32bcad'">
            💸 Apoiar via PIX
        </button>
        
    </div>

    <hr style="border: 0; border-top: 1px solid #222; margin: 25px 0;">
    <p style="font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px;">Servidor Independente</p>
</div>

<footer>Stoner Rock PE - 2026</footer>

<!-- CHAMANDO O JAVASCRIPT EXTERNO -->
<script src="js/scripts.js"></script>
</body>
</html>
